                          - code [ref=e668]: 生成一组 12 格短剧分镜插画（4 行 × 3 列，每格编号 1-12），电影感写实插画风，胶片颗粒，冷调雨夜，末日废土氛围。全部 12 格必须保持同一个女主角的面部、发型、体型、服装 100% 一致（ultra-consistent character identity across all 12 frames）。主角设定：亚洲女性，20 多岁，长黑发半扎，脏旧的深灰色工装夹克 + 战术裤 + 军靴，脸上有雨水和灰尘痕迹，眼神疲惫但坚定，左臂包扎。 分镜 1-3：寻找生机 1. 她站在荒废的地铁站外，低头在一部老式手机上寻找紧急广播信号，手机微光映在脸上。 2. 她走进一家破败的便利店，货架倒塌、玻璃碎裂，她在翻找未过期的瓶装水和补给。 3. 便利店的玻璃门透出她的倒影，疲惫神情清晰可见，门外霓虹招牌在雨中微微闪烁。 分镜 4-6：艰难归途与物资盘点 4. 她在被雨水浸湿的斑马线前停下，红灯亮着，街道空无一人，路灯在水面映出倒影。 5. 回到避难所，她把湿漉漉的雨伞靠在门边，肩膀下垂，刚进门的疲态。 6. 昏黄烛光下，她盘腿坐在地上，认真数着带回来的几罐罐头和一瓶水，桌上铺着粗糙的布。 分镜 7-9：信息、伤痛与规划 7. 她守在一台老式无线电旁，侧耳贴近喇叭，在滋滋杂音中寻找外界信号。 8. 她低头小心处理左臂上的伤口，纱布、消毒水摆在旁边，表情隐忍。 9. 她在手电筒微弱的光线下俯身研究一张摊开的城市地图，手指顺着一条撤离路线划过。 分镜 10-12：警觉与再次启程 10. 深夜，窗外一个声响让她瞬间警觉，她一手抓起武器（手枪或短棍），眼神冷峻戒备。 11. 她站在窗前，静静望着外面荒凉潮湿的废土世界，远处是倒塌的楼群剪影。 12. 清晨微光中，她背上厚重的背包，戴上防毒面具，迎着细雨再次踏上旅程，背影坚定。 要求：每格构图饱满、电影感镜头语言（近景/中景/远景交替），冷调色系（墨绿、灰蓝、锈橙点缀），光比强，雨水和湿润质感清晰。主角服装、发型、伤痕位置、面部特征必须全程一致。4 行 × 3 列均匀排版，格与格之间白色细线分隔，左上角有分镜编号 01-12，无额外文字、无水印。画面比例 3:4，整体横版。
