                          - code [ref=e623]: 一幅手绘风格的城市美食地图，以广州为主题。画面以鸟瞰视角的手绘简化城市地图为底，标注主要道路（如中山路、北京路、天河路）和地标（如广州塔、海心沙、陈家祠、西关大屋、珠江）但不追求精确比例，追求可爱的手绘感。地图上分布着 12 个美食地点的精致手绘小插画：上下九的萝卜牛杂（铁罐内热气腾腾的萝卜和牛杂串，旁边写着"牛杂大王，三十年如一日"）、北京路的广式烧鹅（红亮酥脆的烧鹅挂在档口，旁有酸梅酱，推荐语"街坊口碑，晚去吃不到"）、东山口的艇仔粥（水中摇曳的小船上，热粥冒气，配料丰富，推荐语"早晨一口，精神百倍"）、天河城的煲仔饭（揭开陶瓦煲盖，热气和腊味香气四溢，可见锅巴，推荐语"饭香扑鼻，锅巴一绝"）、西关的双皮奶（一碗凝固光滑的红豆双皮奶用匙羹舀起，推荐语"奶味浓郁，入口即化"）、陈家祠的云吞面（细面上整齐摆放几个鲜虾云吞，汤色清亮，推荐语"弹牙面身，鲜美汤头"）、珠江夜景下的猪脚姜（陶罐内深褐色的甜醋、猪脚和老姜，推荐语"满街飘香，回味无穷"）、广州酒家的早茶推车（各式蒸笼内凤爪、烧卖、虾饺热气腾腾，推荐语"叹茶一盅，美味两件"）、海心沙的马蹄糕（盘中切好的晶莹剔透、有马蹄粒的马蹄糕，推荐语"清甜爽口，夏日必备"）、白云山的肠粉（淋上酱油、皮薄料足的刚出炉肠粉，推荐语"皮薄料足，广州经典"）、广州塔下的白切鸡（摆放整齐皮黄肉白的白切鸡，配姜葱蓉，推荐语"鲜嫩多汁，姜葱是灵魂"）、沙面的干炒牛河（鑊气十足色泽金黄的牛河，牛肉大片，推荐语"鑊气十足，真材实料"）。每个插画约占地图的 5% 面积，旁边用手写体标注店名和推荐语。地图边缘用手绘木棉花、荔枝、龙眼和波浪纹装饰，形成边框。右下角有一个手绘指南针和图例说明。左上角标题"广州 吃货暴走地图"使用胖圆的手绘美术字配木棉花和镬耳墙装饰。整体画风为水彩+彩铅混合的手绘质感，颜色以暖色系（木棉红、姜黄、珠江蓝、翠绿）为主，图片比例横板 16:9。
