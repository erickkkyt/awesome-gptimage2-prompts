TERING LIGHT.'\", \"negative_prompt\": \"blurry, low quality, distorted face, messy text, extra fingers, deformed buildings, dull colors, dark, gloomy, low resolution, watermark, signature, grainy, Apple Park, Stanford, Google Campus, California, Silicon Valley, young Asian man, 2026.\", \"parameters\": { \"aspect_ratio\": \"9:16\", \"style\": \"Cinematic/Digital Art\", \"lighting\": \"Golden Hour / Sunset\", \"composition\": \"Double Exposure / Layered / Hierarchical\" }, \"key_elements\": [ \"Side profile silhouette of Le Corbusier\", \"Villa Savoye\", \"Unité d'Habitation\", \"Notre Dame du Haut, Ronchamp\", \"Chandigarh Palace of Assembly\", \"Flowing path of architectural plans\", \"Young observer on a peak\", \"Modulor figure motif\", \"Modernist architectural iconography\" ] }"
